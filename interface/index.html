<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM-WIKI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300;1,9..40,400&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #faf8f5;
            --bg-surface: #ffffff;
            --bg-elevated: #f3f0eb;
            --bg-hover: #ece8e2;
            --border: #e5e0d8;
            --border-strong: #cdc6ba;
            --text: #2a2622;
            --text-secondary: #716c64;
            --text-tertiary: #a09a90;
            --accent: #8b6f47;
            --accent-light: #b8976a;
            --accent-bg: rgba(139,111,71,0.06);
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.03);
            --shadow-md: 0 4px 20px rgba(0,0,0,0.05);
            --shadow-lg: 0 12px 48px rgba(0,0,0,0.07);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 24px;
            --ease: cubic-bezier(0.23, 1, 0.32, 1);
            --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        [data-theme="dark"] {
            --bg: #141311;
            --bg-surface: #1c1a17;
            --bg-elevated: #23201c;
            --bg-hover: #2a2722;
            --border: #2e2b26;
            --border-strong: #3d3933;
            --text: #e8e4dd;
            --text-secondary: #9a948a;
            --text-tertiary: #6b655c;
            --accent: #c4a46c;
            --accent-light: #d4bc8a;
            --accent-bg: rgba(196,164,108,0.08);
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.2);
            --shadow-md: 0 4px 20px rgba(0,0,0,0.3);
            --shadow-lg: 0 12px 48px rgba(0,0,0,0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            cursor: none;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            transition: background 0.5s var(--ease), color 0.5s var(--ease);
        }

        .welcome-overlay {
            position: fixed; inset: 0; z-index: 10000;
            background: var(--bg);
            display: flex; align-items: center; justify-content: center; flex-direction: column;
            transition: opacity 0.8s var(--ease), visibility 0.8s;
        }
        .welcome-overlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

        .welcome-content {
            text-align: center;
            animation: welcomeFadeIn 1s var(--ease) 0.2s forwards; opacity: 0;
        }
        @keyframes welcomeFadeIn { from { opacity:0; transform:translateY(30px) scale(0.96); } to { opacity:1; transform:translateY(0) scale(1); } }

        .welcome-logo { width:56px; height:56px; margin:0 auto 32px; position:relative; }
        .welcome-logo .logo-square { position:absolute; inset:0; border:1.5px solid var(--border-strong); border-radius:var(--radius-sm); transform:rotate(45deg) scale(0.5); animation:logoAppear 1s var(--ease-spring) 0.3s forwards; }
        .welcome-logo .logo-inner { position:absolute; inset:14px; border:1px solid var(--accent); border-radius:4px; transform:rotate(45deg) scale(0.3); animation:logoAppear 1s var(--ease-spring) 0.5s forwards; }
        @keyframes logoAppear { to { transform:rotate(45deg) scale(1); } }

        .welcome-title { font-family:'Instrument Serif',serif; font-size:2.8rem; font-weight:400; letter-spacing:12px; color:var(--text); text-transform:uppercase; margin-bottom:12px; }
        .welcome-tagline { font-size:0.65rem; letter-spacing:5px; text-transform:uppercase; color:var(--text-tertiary); margin-bottom:40px; }
        .welcome-bar { width:120px; height:1px; background:var(--border); margin:0 auto; overflow:hidden; }
        .welcome-bar-inner { width:0%; height:100%; background:var(--accent); animation:welcomeProgress 2.5s var(--ease) 0.6s forwards; }
        @keyframes welcomeProgress { to { width:100%; } }
        .welcome-skip { margin-top:32px; font-size:0.62rem; letter-spacing:3px; text-transform:uppercase; color:var(--text-tertiary); background:none; border:1px solid var(--border); padding:12px 32px; border-radius:100px; cursor:none; transition:all 0.3s var(--ease); font-family:'DM Sans',sans-serif; font-weight:500; animation:welcomeFadeIn 0.6s var(--ease) 1.8s forwards; opacity:0; }
        .welcome-skip:hover { background:var(--text); border-color:var(--text); color:var(--bg); }

        .cursor-main { position:fixed; width:8px; height:8px; background:var(--text); border-radius:50%; pointer-events:none; z-index:99999; transition:transform 0.1s var(--ease-spring), background 0.3s; mix-blend-mode:difference; }
        .cursor-ring { position:fixed; width:40px; height:40px; border:1.5px solid var(--accent); border-radius:50%; pointer-events:none; z-index:99998; transition:transform 0.15s var(--ease), width 0.3s, height 0.3s, border-color 0.3s, opacity 0.3s; opacity:0.35; }
        .cursor-ring.hover { width:60px; height:60px; opacity:0.6; border-color:var(--accent-light); }
        .cursor-ring.click { transform:translate(-50%,-50%) scale(0.7) !important; }
        .cursor-trail { position:fixed; width:4px; height:4px; border-radius:50%; pointer-events:none; z-index:99997; background:var(--accent); opacity:0; transition:opacity 0.3s; }

        body::before { content:''; position:fixed; inset:0; background:radial-gradient(ellipse at 30% 70%, var(--accent-bg) 0%, transparent 50%), radial-gradient(ellipse at 70% 20%, var(--accent-bg) 0%, transparent 40%); pointer-events:none; z-index:0; }

        .app { position:relative; z-index:10; width:100%; min-height:100vh; display:flex; flex-direction:column; align-items:center; }

        .header { width:100%; display:flex; flex-direction:column; align-items:center; padding-top:80px; padding-bottom:24px; position:relative; animation:headerReveal 0.8s var(--ease) 0.2s forwards; opacity:0; }
        @keyframes headerReveal { from { opacity:0; transform:translateY(-12px); } to { opacity:1; transform:translateY(0); } }
        .header::after { content:''; position:absolute; bottom:0; left:50%; transform:translateX(-50%); width:60px; height:1px; background:var(--border-strong); }

        .logo-mark { width:36px; height:36px; position:relative; margin-bottom:16px; }
        .logo-mark .sq1 { position:absolute; inset:0; border:1.5px solid var(--border-strong); border-radius:6px; transform:rotate(45deg); transition:transform 0.8s var(--ease-spring); }
        .logo-mark .sq2 { position:absolute; inset:8px; border:1px solid var(--accent); border-radius:3px; transform:rotate(45deg); transition:transform 0.8s var(--ease-spring) 0.1s; }
        .logo-mark:hover .sq1 { transform:rotate(135deg); }
        .logo-mark:hover .sq2 { transform:rotate(-45deg); }

        .LLM { font-family:'Instrument Serif',serif; font-size:2.4rem; font-weight:400; letter-spacing:8px; color:var(--text); text-transform:uppercase; }
        .intro { margin-top:8px; font-size:0.62rem; font-weight:400; letter-spacing:4px; text-transform:uppercase; color:var(--text-tertiary); }

        .top-controls { position:fixed; top:20px; right:20px; display:flex; gap:8px; z-index:500; }
        .icon-btn { width:40px; height:40px; border-radius:50%; border:1px solid var(--border); background:var(--bg-surface); color:var(--text-secondary); cursor:none; display:flex; align-items:center; justify-content:center; box-shadow:var(--shadow-sm); transition:all 0.3s var(--ease); animation:btnReveal 0.5s var(--ease) 0.6s forwards; opacity:0; }
        @keyframes btnReveal { from { opacity:0; transform:translateY(-8px) scale(0.9); } to { opacity:1; transform:translateY(0) scale(1); } }
        .icon-btn:hover { border-color:var(--accent); color:var(--accent); transform:scale(1.05); }
        .icon-btn svg { width:18px; height:18px; fill:currentColor; transition:transform 0.5s var(--ease); }
        .icon-btn:hover svg { transform:rotate(30deg); }

        .chat-container { width:100%; max-width:700px; margin:40px auto 160px; padding:0 20px; }

        .chat-message { display:flex; flex-direction:column; gap:14px; margin-bottom:28px; animation:messageSlideIn 0.5s var(--ease) forwards; opacity:0; transform:translateY(16px); }
        @keyframes messageSlideIn { to { opacity:1; transform:translateY(0); } }

        .message-user { padding:14px 20px; border-radius:var(--radius-md); background:var(--text); color:var(--bg); align-self:flex-end; max-width:78%; font-size:0.88rem; line-height:1.65; font-weight:300; }
        .message-user .message-label { font-size:0.5rem; letter-spacing:2px; text-transform:uppercase; color:rgba(255,255,255,0.35); display:block; margin-bottom:6px; font-weight:500; }
        .message-user .user-text { white-space:pre-wrap; word-wrap:break-word; }

        .message-ai { align-self:flex-start; max-width:95%; display:flex; flex-direction:column; gap:8px; }
        .message-ai .message-label { font-size:0.55rem; letter-spacing:2px; text-transform:uppercase; color:var(--text-tertiary); font-weight:500; padding-left:2px; display:flex; align-items:center; gap:10px; }
        .message-ai .message-label::after { content:''; flex:1; height:1px; background:var(--border); max-width:60px; }

        .markdown-body { font-size:0.88rem; line-height:1.85; color:var(--text); font-weight:350; padding:22px 26px; background:var(--bg-surface); border:1px solid var(--border); border-radius:var(--radius-md); position:relative; }
        .markdown-body h1, .markdown-body h2, .markdown-body h3 { font-family:'Instrument Serif',serif; margin:24px 0 10px; font-weight:400; color:var(--text); }
        .markdown-body h1:first-child, .markdown-body h2:first-child, .markdown-body h3:first-child { margin-top:0; }
        .markdown-body h1 { font-size:1.5rem; }
        .markdown-body h2 { font-size:1.2rem; }
        .markdown-body h3 { font-size:1.05rem; }
        .markdown-body p { margin:12px 0; }
        .markdown-body p:first-child { margin-top:0; }
        .markdown-body p:last-child { margin-bottom:0; }
        .markdown-body ul, .markdown-body ol { padding-left:20px; margin:12px 0; }
        .markdown-body li { margin:6px 0; line-height:1.7; }
        .markdown-body code { background:var(--bg-elevated); padding:2px 7px; border-radius:4px; font-family:'JetBrains Mono',monospace; font-size:0.82em; color:var(--accent); border:1px solid var(--border); }
        .markdown-body pre { background:#1e1c19; color:#e8e4de; padding:18px 20px; border-radius:var(--radius-sm); overflow:auto; margin:16px 0; font-family:'JetBrains Mono',monospace; font-size:0.82rem; line-height:1.65; border:1px solid #2c2825; position:relative; }
        [data-theme="dark"] .markdown-body pre { background:#0e0d0b; border-color:var(--border-strong); }
        .markdown-body pre code { background:none; padding:0; border:none; color:inherit; font-size:inherit; }
        .markdown-body pre .copy-btn { position:absolute; top:8px; right:8px; padding:4px 10px; background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.1); border-radius:4px; color:rgba(255,255,255,0.5); font-size:0.6rem; letter-spacing:1px; text-transform:uppercase; cursor:none; font-family:'DM Sans',sans-serif; font-weight:500; transition:all 0.2s var(--ease); opacity:0; }
        .markdown-body pre:hover .copy-btn { opacity:1; }
        .markdown-body pre .copy-btn:hover { background:rgba(255,255,255,0.15); color:rgba(255,255,255,0.8); }
        .markdown-body pre .copy-btn.copied { background:rgba(139,111,71,0.3); color:#e8e4de; }
        .markdown-body table { width:100%; border-collapse:collapse; margin:16px 0; font-size:0.84rem; }
        .markdown-body td, .markdown-body th { border:1px solid var(--border); padding:8px 12px; text-align:left; }
        .markdown-body th { background:var(--bg-elevated); font-weight:600; }
        .markdown-body a { color:var(--accent); text-decoration:none; border-bottom:1px solid transparent; transition:border-color 0.15s; }
        .markdown-body a:hover { border-bottom-color:var(--accent); }
        .markdown-body strong { font-weight:600; }
        .markdown-body em { font-style:italic; color:var(--text-secondary); }
        .markdown-body blockquote { border-left:2px solid var(--accent); padding-left:16px; margin:16px 0; color:var(--text-secondary); font-style:italic; font-family:'Instrument Serif',serif; font-size:1.05rem; }
        .markdown-body hr { border:none; border-top:1px solid var(--border); margin:20px 0; }
        .markdown-body ::selection { background:rgba(139,111,71,0.2); color:var(--text); }
        .markdown-body pre ::selection { background:rgba(196,164,108,0.25); color:#e8e4de; }

        /* Fixed details/summary styling */
        .markdown-body details { color:var(--text); margin:8px 0; padding:10px 14px; background:var(--bg-elevated); border:1px solid var(--border); border-radius:var(--radius-sm); }
        .markdown-body details summary { cursor:pointer; font-weight:500; color:var(--accent); font-family:'JetBrains Mono',monospace; font-size:0.82rem; padding:4px 0; user-select:none; }
        .markdown-body details summary:hover { color:var(--accent-light); }
        .markdown-body details[open] summary { margin-bottom:8px; border-bottom:1px solid var(--border); padding-bottom:8px; }
        .markdown-body details pre { margin:8px 0 0; background:var(--bg); border-color:var(--border); }
        .markdown-body details .detail-content { color:var(--text); line-height:1.6; font-size:0.82rem; white-space:pre-wrap; word-wrap:break-word; }

        .streaming-cursor { display:inline-block; width:2px; height:1.15em; background:var(--accent); margin-left:2px; vertical-align:text-bottom; animation:cursorBlink 0.7s step-end infinite; }
        @keyframes cursorBlink { 0%,100% { opacity:1; } 50% { opacity:0; } }

        .typing { display:flex; gap:5px; align-items:center; padding:16px 22px; background:var(--bg-surface); border:1px solid var(--border); border-radius:var(--radius-md); width:fit-content; }
        .typing span { width:6px; height:6px; border-radius:50%; background:var(--text-tertiary); animation:typingDot 1.4s var(--ease) infinite; }
        .typing span:nth-child(2) { animation-delay:0.2s; }
        .typing span:nth-child(3) { animation-delay:0.4s; }
        @keyframes typingDot { 0%,60%,100% { opacity:0.2; transform:translateY(0) scale(1); } 30% { opacity:1; transform:translateY(-5px) scale(1.2); } }

        /* Search status indicators */
        .search-status { display:flex; flex-direction:column; gap:6px; padding:14px 18px; background:var(--bg-surface); border:1px solid var(--border); border-radius:var(--radius-md); font-size:0.78rem; }
        .search-item { display:flex; align-items:center; gap:8px; color:var(--text-secondary); font-family:'JetBrains Mono',monospace; font-size:0.72rem; }
        .search-item .dot { width:6px; height:6px; border-radius:50%; background:var(--text-tertiary); transition:all 0.3s var(--ease); flex-shrink:0; }
        .search-item.active .dot { background:var(--accent); animation:dotPulse 1.2s var(--ease) infinite; }
        .search-item.done .dot { background:#4caf50; animation:none; }
        .search-item .label { flex:1; }
        .search-item .count { color:var(--accent); font-weight:500; }
        @keyframes dotPulse { 0%,100% { transform:scale(1); opacity:1; } 50% { transform:scale(1.4); opacity:0.6; } }

        /* Thinking indicator */
        .thinking-block { padding:10px 16px; background:var(--accent-bg); border:1px solid var(--border); border-radius:var(--radius-sm); font-size:0.78rem; color:var(--text-secondary); font-style:italic; margin:4px 0; border-left:3px solid var(--accent); }

        /* Action card */
        .action-card { margin:6px 0; padding:8px 12px; background:var(--bg-elevated); border:1px solid var(--border); border-radius:6px; font-size:0.78rem; }
        .action-card summary { cursor:pointer; font-weight:500; color:var(--accent); font-family:'JetBrains Mono',monospace; font-size:0.78rem; padding:4px 0; user-select:none; list-style:none; display:flex; align-items:center; gap:6px; }
        .action-card summary::-webkit-details-marker { display:none; }
        .action-card summary::before { content:'\25B6'; font-size:0.6rem; transition:transform 0.2s var(--ease); }
        .action-card[open] summary::before { transform:rotate(90deg); }
        .action-card pre { margin:8px 0 0; padding:8px; background:var(--bg); border:1px solid var(--border); border-radius:4px; font-size:0.72rem; overflow-x:auto; white-space:pre-wrap; color:var(--text); }
        .action-card .action-status { font-size:0.68rem; color:var(--text-tertiary); margin-top:4px; }

        /* Clickable choice buttons (Plan mode) */
        .choice-container { display:flex; flex-direction:column; gap:10px; margin:12px 0; }
        .choice-question { font-size:0.88rem; color:var(--text); font-weight:500; margin-bottom:4px; }
        .choice-options { display:flex; flex-wrap:wrap; gap:8px; }
        .choice-pill { padding:8px 18px; border-radius:100px; border:1px solid var(--border); background:var(--bg-surface); color:var(--text-secondary); font-size:0.8rem; font-family:'DM Sans',sans-serif; font-weight:400; cursor:none; transition:all 0.25s var(--ease); user-select:none; }
        .choice-pill:hover { border-color:var(--accent); color:var(--accent); background:var(--accent-bg); transform:translateY(-1px); }
        .choice-pill.selected { background:var(--accent); color:var(--bg); border-color:var(--accent); }
        .choice-pill.multi { position:relative; padding-left:28px; }
        .choice-pill.multi::before { content:''; position:absolute; left:10px; top:50%; transform:translateY(-50%); width:14px; height:14px; border-radius:3px; border:1.5px solid var(--border); transition:all 0.2s var(--ease); }
        .choice-pill.multi.selected::before { background:var(--bg); border-color:var(--bg); }

        .input-container { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); width:92%; max-width:660px; display:flex; align-items:flex-end; gap:8px; background:var(--bg-surface); padding:8px 8px 8px 20px; border-radius:var(--radius-xl); border:1px solid var(--border); box-shadow:var(--shadow-md); z-index:100; transition:border-color 0.3s var(--ease), box-shadow 0.3s var(--ease); animation:inputSlideUp 0.6s var(--ease) 0.5s forwards; opacity:0; }
        @keyframes inputSlideUp { from { opacity:0; transform:translateX(-50%) translateY(24px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }
        .input-container:focus-within { border-color:var(--accent); box-shadow:var(--shadow-md), 0 0 0 3px var(--accent-bg); }

        .text-input { flex:1; padding:10px 0; font-size:0.88rem; font-family:'DM Sans',sans-serif; font-weight:300; background:transparent; border:none; outline:none; color:var(--text); resize:none; min-height:22px; max-height:140px; line-height:1.5; white-space:pre-wrap; word-wrap:break-word; overflow-x:hidden; scrollbar-width:thin; scrollbar-color:var(--border) transparent; }
        .text-input::placeholder { color:var(--text-tertiary); font-style:italic; font-family:'Instrument Serif',serif; font-size:0.95rem; }

        .submit-btn { padding:10px 22px; background:var(--text); border:none; border-radius:var(--radius-lg); color:var(--bg); cursor:none; font-family:'DM Sans',sans-serif; font-size:0.65rem; font-weight:600; letter-spacing:1.5px; text-transform:uppercase; transition:all 0.3s var(--ease); flex-shrink:0; }
        .submit-btn:hover { background:var(--accent); }
        .submit-btn:active { transform:scale(0.96); }

        .reasoning-toggle { width:36px; height:36px; border-radius:50%; border:1px solid var(--border); background:transparent; color:var(--text-tertiary); cursor:none; display:flex; align-items:center; justify-content:center; transition:all 0.3s var(--ease); flex-shrink:0; position:relative; }
        .reasoning-toggle:hover { border-color:var(--accent); color:var(--accent); }
        .reasoning-toggle.active { background:var(--accent-bg); border-color:var(--accent); color:var(--accent); }
        .reasoning-toggle svg { width:16px; height:16px; fill:currentColor; transition:transform 0.3s var(--ease-spring); }
        .reasoning-toggle.active svg { transform:scale(1.1); }
        .reasoning-toggle .reasoning-dot { position:absolute; top:4px; right:4px; width:6px; height:6px; border-radius:50%; background:var(--accent); opacity:0; transition:opacity 0.3s; }
        .reasoning-toggle.active .reasoning-dot { opacity:1; animation:dotPulse 2s var(--ease) infinite; }

        .toast-container { position:fixed; top:80px; right:20px; z-index:99999; display:flex; flex-direction:column; gap:8px; }
        .toast { background:var(--bg-surface); border:1px solid var(--border); border-radius:var(--radius-sm); padding:10px 18px; font-size:0.75rem; color:var(--text-secondary); box-shadow:var(--shadow-md); animation:toastSlideIn 0.35s var(--ease) forwards; font-weight:400; }
        .toast.removing { animation:toastSlideOut 0.3s var(--ease) forwards; }
        @keyframes toastSlideIn { from { opacity:0; transform:translateX(20px) scale(0.95); } to { opacity:1; transform:translateX(0) scale(1); } }
        @keyframes toastSlideOut { from { opacity:1; transform:translateX(0); } to { opacity:0; transform:translateX(20px); } }

        /* Prompt improve indicator */
        .prompt-improved { padding:10px 16px; background:var(--accent-bg); border:1px solid var(--border); border-radius:var(--radius-sm); font-size:0.78rem; margin:6px 0; }
        .prompt-improved .label { font-weight:600; color:var(--accent); font-size:0.7rem; text-transform:uppercase; letter-spacing:1px; margin-bottom:4px; }
        .prompt-improved .text { color:var(--text-secondary); line-height:1.5; }

        /* Web search result cards */
        .web-results { display:flex; flex-direction:column; gap:8px; margin:8px 0; }
        .web-card { padding:10px 14px; background:var(--bg-surface); border:1px solid var(--border); border-radius:var(--radius-sm); transition:all 0.2s var(--ease); }
        .web-card:hover { border-color:var(--accent); }
        .web-card .web-title { font-size:0.82rem; font-weight:500; color:var(--accent); margin-bottom:4px; text-decoration:none; display:block; }
        .web-card .web-title:hover { text-decoration:underline; }
        .web-card .web-url { font-size:0.68rem; color:var(--text-tertiary); font-family:'JetBrains Mono',monospace; word-break:break-all; margin-bottom:4px; }

        function animateCursor() {

                const sizes = [6, 4, 3], opacities = [0.3, 0.2, 0.1];

        const modeIcons = {

        const modeNames = { build: "Build", plan: "Plan", compose: "Compose" };

        function updateModeButton() {

        function scrollBottom() { requestAnimationFrame(() => { window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" }); }); }

        function addCopyButtons(box) {

        function createMessage(query) {
            const modeLabels = { build: "Agent · Build", plan: "Agent · Plan", compose: "Agent · Compose" };
            let label = agentMode ? modeLabels[agentModeValue] || "Agent" : (reasoningMode ? "LLM · reasoning" : "LLM");
            chat.innerHTML += `<div class="chat-message"><div class="message-user"><span class="message-label">You</span><div class="user-text">${escapeHTML(query)}</div></div><div class="message-ai"><span class="message-label">${escapeHTML(label)}</span><div class="markdown-body typing"><span></span><span></span><span></span></div></div></div>`;

        function createSearchStatus() {

                <div class="search-item active" data-source="vector"><div class="dot"></div><span class="label">Searching vector DB...</span></div>

                <div class="search-item active" data-source="wikipedia"><div class="dot"></div><span class="label">Checking Wikipedia...</span></div>
                <div class="search-item active" data-source="skills"><div class="dot"></div><span class="label">Matching skills...</span></div>

        function markSearchDone(statusDiv, source, count) {
            const item = statusDiv.querySelector(`[data-source="${source}"]`);
            if (item) {
                item.classList.remove("active");
                item.classList.add("done");
                const label = item.querySelector(".label");
                if (source === "vector") label.textContent = "Vector DB";
                else if (source === "web") label.textContent = `Web (${count || 0} results)`;
                else if (source === "wikipedia") label.textContent = "Wikipedia";
                else if (source === "skills") label.textContent = `Skills (${count || 0} matched)`;

        // Web search cards
        function renderWebCards(results) {
            if (!results || results.length === 0) return "";
            let html = '<div class="web-results">';
            for (const r of results) {
                html += `<div class="web-card"><a class="web-title" href="${escapeHTML(r.url)}" target="_blank">${escapeHTML(r.title || r.url)}</a><div class="web-url">${escapeHTML(r.url)}</div><div class="web-snippet">${escapeHTML(r.snippet || "")}</div></div>`;
            }
            html += "</div>";

        }

        // Clickable choices for Plan mode
        function renderChoices(questions) {
            let html = '<div class="choice-container">';
            for (const q of questions) {
                html += `<div class="choice-question">${escapeHTML(q.question)}</div><div class="choice-options">`;
                for (let i = 0; i < q.options.length; i++) {
                    html += `<button class="choice-pill" data-question="${escapeHTML(q.question)}" data-option="${escapeHTML(q.options[i])}">${escapeHTML(q.options[i])}</button>`;
                }
                html += "</div>";
            }
            html += "</div>";
            return html;
        }

        // Parse plan mode questions from text
        function parsePlanQuestions(text) {
            const questions = [];
            const lines = text.split("\n");
            let currentQ = null;
            for (const line of lines) {
                const qMatch = line.match(/^(?:\d+[\.\)]\s*|\*\*)?(?:Вопрос|Question)?\*{0,2}\s*:?\s*\*{0,2}(.+\?)\s*$/i);
                if (qMatch) {
                    if (currentQ && currentQ.options.length >= 2) questions.push(currentQ);
                    currentQ = { question: qMatch[1].trim(), options: [] };
                    continue;
                }
                if (currentQ) {
                    const optMatch = line.match(/^\s*[-\*]\s*\*{0,2}(.+?)\*{0,2}\s*$/);
                    if (optMatch && optMatch[1].trim().length > 1 && !optMatch[1].includes("?")) {
                        currentQ.options.push(optMatch[1].trim());
                    }
                }
            }
            if (currentQ && currentQ.options.length >= 2) questions.push(currentQ);
            return questions;
        }

        // Streaming search
        async function streamSearch(query, box) {
            isStreaming = true;
            let fullText = "";
            let improvedPromptHtml = "";
            box.classList.remove("typing");

            const statusDiv = createSearchStatus();
            const answerDiv = document.createElement("div");
            answerDiv.className = "markdown-body";
            answerDiv.style.display = "none";
            box.innerHTML = "";
            box.appendChild(statusDiv);
            box.appendChild(answerDiv);

            try {
                const body = new FormData();
                body.append("query", query);
                body.append("reasoning", String(reasoningMode));
                body.append("improve_prompt", String(improveMode));
                const response = await fetch(STREAM_API, { method: "POST", body });
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split("\n");
                    buffer = lines.pop();
                    for (const line of lines) {
                        if (!line.startsWith("data: ")) continue;
                        try {
                            const p = JSON.parse(line.slice(6));
                            if (p.type === "error") { box.innerHTML = "Error: " + escapeHTML(p.content); return; }
                            if (p.type === "improved_prompt") { improvedPromptHtml = `<div class="prompt-improved"><div class="label">Improved prompt</div><div class="text">${escapeHTML(p.improved)}</div></div>`; }
                            if (p.type === "search_done") { markSearchDone(statusDiv, p.source, p.results); }
                            if (p.type === "answer_chunk") {
                                fullText += p.content;
                                answerDiv.style.display = "block";
                                answerDiv.innerHTML = marked.parse(fullText) + '<span class="streaming-cursor"></span>';
                                scrollBottom();
                            }
                        } catch {}
                    }
                }

                if (fullText) {
                    answerDiv.innerHTML = marked.parse(fullText);
                    addCopyButtons(answerDiv);
                } else {
                    answerDiv.innerHTML = '<p style="color:var(--text-tertiary)">No response</p>';
                    answerDiv.style.display = "block";
                }
                if (improvedPromptHtml) {
                    const promptDiv = document.createElement("div");
                    promptDiv.innerHTML = improvedPromptHtml;
                    box.insertBefore(promptDiv, answerDiv);
                }
                scrollBottom();
            } catch (e) { box.innerHTML = "Error: " + escapeHTML(e.message); }
            finally { isStreaming = false; }
        }

        // Streaming agent
        async function streamAgent(query, box, isFollowUp = false) {
            isStreaming = true;
            box.classList.remove("typing");

            const responseDiv = document.createElement("div");
            responseDiv.style.cssText = "display:flex;flex-direction:column;gap:8px;";
            if (!isFollowUp) box.innerHTML = "";
            box.appendChild(responseDiv);

            let thinkingBlock = null;
            let answerBlock = null;
            let thinkingText = "";
            let answerText = "";

            try {
                const response = await fetch(AGENT_API, {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({query, mode: agentModeValue, history: chatHistory})
                });
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split("\n");
                    buffer = lines.pop();
                    for (const line of lines) {
                        if (!line.startsWith("data: ")) continue;
                        try {
                            const p = JSON.parse(line.slice(6));

                            if (p.type === "thinking") {
                                thinkingText += p.content;
                                if (!thinkingBlock) {
                                    thinkingBlock = document.createElement("div");
                                    thinkingBlock.className = "thinking-block";
                                    responseDiv.appendChild(thinkingBlock);
                                }
                                thinkingBlock.textContent = thinkingText.slice(-500);
                                scrollBottom();
                            }

                            if (p.type === "action_start") {
                                const toolName = p.tool;
                                let detail = "";
                                if (toolName === "execute_command") detail = escapeHTML(p.args.command || "");
                                else if (toolName === "read_file") detail = escapeHTML(p.args.path || "");
                                else if (toolName === "write_file") detail = escapeHTML(p.args.path || "");
                                else if (toolName === "list_directory") detail = escapeHTML(p.args.path || "cwd");
                                else if (toolName === "create_directory") detail = escapeHTML(p.args.path || "");
                                else if (toolName === "delete_file") detail = escapeHTML(p.args.path || "");
                                else if (toolName === "search_in_files") detail = escapeHTML(p.args.query || "");
                                else if (toolName === "web_search") detail = escapeHTML(p.args.query || "");
                                else if (toolName === "search_skills") detail = escapeHTML(p.args.query || "");
                                else if (toolName === "install_skill") detail = escapeHTML(p.args.skill_name || "");
                                else if (toolName === "run_python") detail = "Python script";
                                else if (toolName === "git_command") detail = escapeHTML(p.args.command || "");
                                else if (toolName === "http_request") detail = escapeHTML(p.args.url || "");
                                else if (toolName === "download_github_skills") detail = escapeHTML(p.args.repo || "");
                                else if (toolName === "list_skills") detail = escapeHTML(p.args.category || "all");
                                else detail = JSON.stringify(p.args);

                                const card = document.createElement("details");
                                card.className = "action-card";
                                card.open = true;
                                card.innerHTML = `<summary>${escapeHTML(toolName)}: ${detail}</summary><div class="action-status">Executing...</div>`;
                                responseDiv.appendChild(card);
                                scrollBottom();
                            }

                            if (p.type === "action_result") {
                                const cards = responseDiv.querySelectorAll(".action-card");
                                const lastCard = cards[cards.length - 1];
                                if (lastCard) {
                                    const status = lastCard.querySelector(".action-status");
                                    const resultStr = JSON.stringify(p.result, null, 2);
                                    if (status) {
                                        const pre = document.createElement("pre");
                                        pre.textContent = resultStr;
                                        status.replaceWith(pre);
                                    }
                                    lastCard.open = false;
                                }
                            }

                            if (p.type === "answer_chunk") {
                                answerText += p.content;
                                if (!answerBlock) {
                                    answerBlock = document.createElement("div");
                                    answerBlock.className = "markdown-body";
                                    responseDiv.appendChild(answerBlock);
                                }
                                answerBlock.innerHTML = marked.parse(answerText) + '<span class="streaming-cursor"></span>';
                                scrollBottom();
                            }

                            if (p.type === "answer") {
                                answerText = p.content;
                                if (!answerBlock) {
                                    answerBlock = document.createElement("div");
                                    answerBlock.className = "markdown-body";
                                    responseDiv.appendChild(answerBlock);
                                }
                                answerBlock.innerHTML = marked.parse(answerText);
                                addCopyButtons(answerBlock);
                                scrollBottom();
                            }

                            if (p.type === "done") {
                                if (answerBlock && answerText) {
                                    answerBlock.innerHTML = marked.parse(answerText);
                                    addCopyButtons(answerBlock);
                                } else if (!answerText && thinkingText) {
                                    if (!answerBlock) {
                                        answerBlock = document.createElement("div");
                                        answerBlock.className = "markdown-body";
                                        responseDiv.appendChild(answerBlock);
                                    }
                                    answerBlock.innerHTML = marked.parse(thinkingText);
                                    addCopyButtons(answerBlock);
                                    answerText = thinkingText;
                                }
                                if (thinkingBlock) thinkingBlock.remove();
                            }

                            if (p.type === "error") {
                                const errDiv = document.createElement("div");
                                errDiv.className = "markdown-body";
                                errDiv.style.color = "#c0392b";
                                errDiv.textContent = "Error: " + p.content;
                                responseDiv.appendChild(errDiv);
                            }
                        } catch {}
                    }
                }

                if (answerText) {
                    chatHistory.push({role: "user", content: query});
                    chatHistory.push({role: "assistant", content: answerText});
                    if (chatHistory.length > 40) chatHistory = chatHistory.slice(-40);
                }

                if (agentModeValue === "plan" && answerText && (answerText.includes("Готов к реализации") || answerText.includes("план готов") || answerText.includes("Готов к"))) {
                    const actionDiv = document.createElement("div");
                    actionDiv.style.cssText = "display:flex;gap:8px;margin-top:12px;";
                    const execBtn = document.createElement("button");
                    execBtn.className = "submit-btn";
                    execBtn.textContent = "Реализовать план";
                    execBtn.addEventListener("click", () => {
                        agentModeValue = "build";
                        updateModeButton();
                        const planText = answerText;
                        actionDiv.remove();
                        input.value = "Реализуй этот план:\n\n" + planText;
                        form.requestSubmit();
                    });
                    const cancelBtn = document.createElement("button");
                    cancelBtn.className = "submit-btn";
                    cancelBtn.style.cssText = "background:var(--bg-elevated);color:var(--text-secondary);";
                    cancelBtn.textContent = "Отмена";
                    cancelBtn.addEventListener("click", () => actionDiv.remove());
                    actionDiv.appendChild(execBtn);
                    actionDiv.appendChild(cancelBtn);
                    responseDiv.appendChild(actionDiv);
                }

                scrollBottom();
            } catch (e) { box.innerHTML = "Error: " + escapeHTML(e.message); }
            finally { isStreaming = false; }
        }

        input.addEventListener("input", function() { this.style.height = "auto"; this.style.height = Math.min(this.scrollHeight, 140) + "px"; });
        input.addEventListener("keydown", function(e) { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); form.requestSubmit(); } });

        form.addEventListener("submit", async e => {
            e.preventDefault();
            const query = input.value.trim();
            if (!query || isStreaming) return;
            input.value = ""; input.style.height = "auto";
            const box = createMessage(query);
            scrollBottom();
            if (agentMode) await streamAgent(query, box);
            else await streamSearch(query, box);
        });

        // Handle clickable choices
        document.addEventListener("click", (e) => {
            const pill = e.target.closest(".choice-pill");
            if (pill) {
                pill.classList.toggle("selected");
                const question = pill.dataset.question;
                const option = pill.dataset.option;
                const isMulti = pill.classList.contains("multi");

                if (!isMulti) {
                    const container = pill.closest(".choice-options");
                    if (container) container.querySelectorAll(".choice-pill").forEach(p => { if (p !== pill) p.classList.remove("selected"); });
                }

                const selected = pill.closest(".choice-container").querySelectorAll(".choice-pill.selected");
                if (selected.length > 0) {
                    const answers = Array.from(selected).map(s => s.dataset.option).join(", ");
                    input.value = answers;
                    input.focus();
                }
            }
        });

        // Files panel
        const FILES_API = "http://127.0.0.1:8000/api/files";
        const filesPanel = document.getElementById("filesPanel");
        const filesToggle = document.getElementById("filesToggle");
        const closeFilesPanel = document.getElementById("closeFilesPanel");
        const filesTree = document.getElementById("filesTree");
        const filesBreadcrumb = document.getElementById("filesBreadcrumb");
        const filesNewFile = document.getElementById("filesNewFile");
        const filesNewFolder = document.getElementById("filesNewFolder");
        const filesRefresh = document.getElementById("filesRefresh");
        const filesPathInput = document.getElementById("filesPathInput");
        const fileEditorOverlay = document.getElementById("fileEditorOverlay");
        const editorFileName = document.getElementById("editorFileName");
        const editorContent = document.getElementById("editorContent");
        const editorPreview = document.getElementById("editorPreview");
        const editorSave = document.getElementById("editorSave");
        const editorRename = document.getElementById("editorRename");
        const editorDelete = document.getElementById("editorDelete");
        const editorClose = document.getElementById("editorClose");
        const editorToggleView = document.getElementById("editorToggleView");

        let currentFilePath = "";
        let currentDir = "";
        let editorMode = "edit";
        let cmEditor = null;

        function getLangMode(ext) {
            const map = { ".py": "python", ".js": "javascript", ".jsx": "javascript", ".ts": "javascript", ".tsx": "javascript", ".html": "htmlmixed", ".htm": "htmlmixed", ".css": "css", ".scss": "css", ".json": { name: "javascript", json: true }, ".md": "gfm", ".markdown": "gfm", ".java": "text/x-java", ".c": "text/x-c", ".cpp": "text/x-c++src", ".h": "text/x-c", ".cs": "text/x-csharp", ".xml": "xml", ".yaml": "yaml", ".yml": "yaml", ".sh": "shell", ".bash": "shell", ".bat": "shell", ".sql": "sql", ".rb": "ruby", ".go": "go", ".rs": "rust", ".php": "php", ".swift": "swift" };
            return map[ext] || "null";
        }

        function initCodeMirror(content, ext) {
            const container = document.getElementById("editorCm");
            if (cmEditor) { cmEditor.toTextArea(); cmEditor = null; }
            editorContent.value = content;
            const isDark = getTheme() === "dark";
            cmEditor = CodeMirror(container, { value: content, mode: getLangMode(ext), theme: isDark ? "material-darker" : "default", lineNumbers: true, matchBrackets: true, autoCloseBrackets: true, styleActiveLine: true, foldGutter: true, gutters: ["CodeMirror-linenumbers", "CodeMirror-foldgutter"], indentUnit: 4, tabSize: 4, indentWithTabs: false, lineWrapping: false, extraKeys: { "Tab": (cm) => cm.replaceSelection("    ", "end"), "Ctrl-S": () => editorSave.click(), "Cmd-S": () => editorSave.click() } });
            setTimeout(() => cmEditor.refresh(), 10);
        }

        function openFilesPanel() { filesPanel.classList.add("open"); overlay.classList.add("active"); loadFiles("C:/"); }
        function closeFilesPanelFn() { filesPanel.classList.remove("open"); overlay.classList.remove("active"); }
        filesToggle.addEventListener("click", openFilesPanel);
        closeFilesPanel.addEventListener("click", closeFilesPanelFn);
        filesPathInput.addEventListener("keydown", (e) => { if (e.key === "Enter") { e.preventDefault(); const val = filesPathInput.value.trim(); if (val) loadFiles(val); } });

        async function loadFiles(dir) {
            currentDir = dir; filesPathInput.value = dir;
            try { const r = await fetch(`${FILES_API}/tree?path=${encodeURIComponent(dir)}`); const data = await r.json(); if (data.error) { filesTree.innerHTML = `<div class="empty-msg">${escapeHTML(data.error)}</div>`; return; } renderBreadcrumb(dir); renderFileTree(data.items || []); } catch { filesTree.innerHTML = '<div class="empty-msg">Error loading</div>'; }
        }

        function renderBreadcrumb(dir) {
            const parts = dir ? dir.split("/").filter(Boolean) : [];
            let html = ""; let accumulated = "";
            for (let i = 0; i < parts.length; i++) { const part = parts[i]; accumulated += (accumulated ? "/" : "") + part; const p = accumulated; const sep = (i === 0 && part.endsWith(":")) ? "" : (i > 0 ? " / " : ""); html += `${sep}<span data-path="${escapeHTML(p)}">${escapeHTML(part)}</span>`; }
            if (!html) html = '<span data-path="C:/">C:</span>';
            filesBreadcrumb.innerHTML = html;
            filesBreadcrumb.querySelectorAll("span").forEach(s => { s.addEventListener("click", () => loadFiles(s.dataset.path)); });
        }

        function renderFileTree(items) {
            if (!items.length) { filesTree.innerHTML = '<div class="empty-msg">Empty folder</div>'; return; }
            filesTree.innerHTML = items.map(item => {
                const isDir = item.type === "dir";
                const icon = isDir ? '<svg class="file-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M10 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg>' : '<svg class="file-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm-1 2l5 5h-5V4zM6 20V4h5v7h7v9H6z"/></svg>';
                const size = isDir ? "" : formatSize(item.size);
                return `<div class="file-item" data-path="${escapeHTML(item.path)}" data-type="${item.type}">${icon}<span class="file-name">${escapeHTML(item.name)}</span>${size ? `<span class="file-size">${size}</span>` : ""}</div>`;
            }).join("");
            filesTree.querySelectorAll(".file-item").forEach(el => { el.addEventListener("click", () => { const p = el.dataset.path; const t = el.dataset.type; if (t === "dir") loadFiles(p); else openFileEditor(p); }); });
        }

        function formatSize(b) { if (b < 1024) return b + " B"; if (b < 1048576) return (b / 1024).toFixed(1) + " KB"; return (b / 1048576).toFixed(1) + " MB"; }

        async function openFileEditor(path) {
            try { const r = await fetch(`${FILES_API}/read?path=${encodeURIComponent(path)}`); const data = await r.json(); if (data.error) { showToast(data.error); return; } currentFilePath = path; editorFileName.textContent = path; editorMode = "edit"; const cmContainer = document.getElementById("editorCm"); cmContainer.classList.remove("hidden"); editorContent.classList.add("hidden"); editorPreview.classList.remove("active"); editorPreview.innerHTML = ""; editorToggleView.textContent = "Preview"; initCodeMirror(data.content, data.ext || ""); fileEditorOverlay.classList.add("active"); } catch { showToast("Error opening file"); }
        }

        editorClose.addEventListener("click", () => fileEditorOverlay.classList.remove("active"));
        fileEditorOverlay.addEventListener("click", (e) => { if (e.target === fileEditorOverlay) fileEditorOverlay.classList.remove("active"); });
        editorSave.addEventListener("click", async () => { if (!currentFilePath) return; const content = cmEditor ? cmEditor.getValue() : editorContent.value; try { const r = await fetch(`${FILES_API}/write`, { method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify({path: currentFilePath, content}) }); const d = await r.json(); if (d.error) { showToast(d.error); return; } showToast("Saved"); loadFiles(currentDir); } catch { showToast("Save error"); } });
        editorRename.addEventListener("click", async () => { if (!currentFilePath) return; const oldName = currentFilePath.split("/").pop(); const newName = prompt("New name:", oldName); if (!newName || newName === oldName) return; try { const r = await fetch(`${FILES_API}/rename`, { method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify({old_path: currentFilePath, new_name: newName}) }); const d = await r.json(); if (d.error) { showToast(d.error); return; } currentFilePath = d.path; editorFileName.textContent = d.path; showToast("Renamed"); loadFiles(currentDir); } catch { showToast("Rename error"); } });
        editorDelete.addEventListener("click", async () => { if (!currentFilePath || !confirm("Delete this file?")) return; try { const r = await fetch(`${FILES_API}/delete`, { method: "DELETE", headers: {"Content-Type": "application/json"}, body: JSON.stringify({path: currentFilePath}) }); const d = await r.json(); if (d.error) { showToast(d.error); return; } fileEditorOverlay.classList.remove("active"); showToast("Deleted"); loadFiles(currentDir); } catch { showToast("Delete error"); } });
        editorToggleView.addEventListener("click", () => { const cmContainer = document.getElementById("editorCm"); if (editorMode === "edit") { editorMode = "preview"; cmContainer.classList.add("hidden"); editorContent.classList.add("hidden"); editorPreview.classList.add("active"); const content = cmEditor ? cmEditor.getValue() : editorContent.value; editorPreview.innerHTML = marked.parse(content); editorToggleView.textContent = "Edit"; } else { editorMode = "edit"; cmContainer.classList.remove("hidden"); editorContent.classList.add("hidden"); editorPreview.classList.remove("active"); editorToggleView.textContent = "Preview"; if (cmEditor) setTimeout(() => cmEditor.refresh(), 10); } });
        editorContent.addEventListener("keydown", (e) => { if (e.key === "s" && (e.ctrlKey || e.metaKey)) { e.preventDefault(); editorSave.click(); } });
        filesNewFile.addEventListener("click", async () => { const name = prompt("File name (e.g. script.py):"); if (!name) return; const path = currentDir ? currentDir + "/" + name : name; try { const r = await fetch(`${FILES_API}/write`, { method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify({path, content: ""}) }); const d = await r.json(); if (d.error) { showToast(d.error); return; } showToast("Created"); loadFiles(currentDir); openFileEditor(d.path); } catch { showToast("Error"); } });
        filesNewFolder.addEventListener("click", async () => { const name = prompt("Folder name:"); if (!name) return; const path = currentDir ? currentDir + "/" + name : name; try { const r = await fetch(`${FILES_API}/mkdir`, { method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify({path}) }); const d = await r.json(); if (d.error) { showToast(d.error); return; } showToast("Created"); loadFiles(currentDir); } catch { showToast("Error"); } });
        filesRefresh.addEventListener("click", () => loadFiles(currentDir));
    </script>
</body>
</html>
